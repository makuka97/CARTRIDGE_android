<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>CARTRIDGE</title>
  <link rel="stylesheet" href="styles/vars.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/mobile.css" />
</head>
<body>
<div id="app">
  <header class="m-header">
    <span class="m-header__title">CARTRIDGE</span>
  </header>

  <div class="m-page" id="page-games">
    <div class="m-search-wrap">
      <div class="m-search">
        <svg class="m-search__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="m-search__input" id="lib-search-input" type="search" placeholder="Search Games" autocomplete="off" spellcheck="false" />
      </div>
    </div>
    <div class="m-scan-wrap">
      <button class="m-scan-btn" id="btn-scan">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>
        Scan for Games
      </button>
    </div>
    <div class="m-progress" id="scan-progress" style="display:none">
      <div class="m-progress__bar"><div class="m-progress__fill" id="progress-fill"></div></div>
      <p class="m-progress__label" id="progress-label">Scanning…</p>
    </div>
    <div class="m-select-bar" id="select-bar" style="display:none">
      <span id="select-count">0 selected</span>
      <div class="m-select-bar__actions">
        <button class="m-btn m-btn--danger" id="btn-delete" disabled>Delete</button>
        <button class="m-btn" id="btn-cancel-select">Cancel</button>
      </div>
    </div>
    <div class="m-pills" id="sys-nav-list"></div>
    <div class="m-grid-scroll" id="lib-col__scroll">
      <div class="m-empty" id="lib-empty">
        <svg class="m-empty__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" width="56" height="56"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="16" cy="12" r="2"/><rect x="4" y="10" width="4" height="4" rx="1"/></svg>
        <div class="m-empty__title">No games yet</div>
        <div class="m-empty__sub">Tap "Scan for Games"<br/>to find ROMs on your device</div>
      </div>
      <div class="m-grid" id="game-grid"></div>
    </div>
  </div>

  <!-- Settings page -->
  <div class="m-page m-page--hidden" id="page-settings">
    <div class="m-section-title">Settings</div>
    <div class="m-settings-scroll">

      <!-- ROM Scanner -->
      <div class="m-settings-label">Library</div>
      <div class="m-settings-group">
        <div class="m-settings-row" id="btn-rescan">
          <div class="m-settings-row__label">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>
            Scan for Games
          </div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
        </div>
      </div>

      <!-- Box Art / SteamGridDB -->
      <div class="m-settings-label">Box Art</div>
      <div class="m-settings-group">

        <!-- API key status row -->
        <div class="m-settings-row" id="api-status-row">
          <div class="m-settings-row__label">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
            SteamGridDB API Key
          </div>
          <span id="api-key-status" style="font-size:12px;color:var(--color-text-sub)">Not set</span>
        </div>

        <!-- API key input -->
        <div class="m-settings-input-row">
          <input
            class="m-settings-input"
            id="api-key-input"
            type="text"
            placeholder="Paste your API key here"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
          />
          <button class="m-settings-save-btn" id="btn-save-key">Save</button>
        </div>

        <!-- Get API key link -->
        <div class="m-settings-row" id="btn-get-api-key">
          <div class="m-settings-row__label" style="color:#7c73ff">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7c73ff" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Get a free API key
          </div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
        </div>

        <!-- Scrape all button -->
        <div class="m-settings-row" id="btn-scrape-all">
          <div class="m-settings-row__label">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Fetch Art for All Games
          </div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
        </div>

      </div>

      <p class="m-settings-version">CARTRIDGE v0.4.0 — Android</p>
    </div>
  </div>

  <nav class="m-bottom-nav">
    <button class="m-nav-btn m-nav-btn--active" id="nav-games" data-page="games">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="16" cy="12" r="2"/><rect x="4" y="10" width="4" height="4" rx="1"/></svg>
      <span>Games</span>
    </button>
    <button class="m-nav-btn" id="nav-settings" data-page="settings">
      <svg width="22" height="22" viewBox="0 0 16 16" fill="currentColor"><path d="M8 10.5A2.5 2.5 0 1 1 8 5.5a2.5 2.5 0 0 1 0 5Zm5.84-1.52a5.57 5.57 0 0 0 .05-.98c0-.34-.03-.67-.08-.98l1.35-1.05a.4.4 0 0 0 .1-.5l-1.28-2.2a.4.4 0 0 0-.48-.17l-1.59.64a5.4 5.4 0 0 0-.84-.49l-.24-1.68A.4.4 0 0 0 10.4 1H7.6a.4.4 0 0 0-.4.34L6.97 3.1a5.4 5.4 0 0 0-.84.49l-1.59-.64a.4.4 0 0 0-.48.17L2.78 5.3a.4.4 0 0 0 .1.5l1.35 1.05a5.57 5.57 0 0 0-.08.98c0 .32.03.65.08.98L2.88 9.86a.4.4 0 0 0-.1.5l1.28 2.2c.1.17.3.23.48.17l1.59-.64c.26.18.54.35.84.49l.24 1.69c.05.2.22.34.4.34h2.8c.2 0 .36-.14.4-.34l.24-1.69c.3-.14.58-.3.84-.49l1.59.64c.18.07.38 0 .48-.17l1.28-2.2a.4.4 0 0 0-.1-.5l-1.35-1.05Z"/></svg>
      <span>Settings</span>
    </button>
  </nav>
</div>

<div id="toast-container" aria-live="polite" aria-atomic="false"></div>
<script src="app.js" type="module"></script>
<script>
// ── Nav ──────────────────────────────────────────────────────────
document.querySelectorAll('.m-nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const page = btn.dataset.page;
    document.querySelectorAll('.m-page').forEach(p => p.classList.add('m-page--hidden'));
    document.querySelectorAll('.m-nav-btn').forEach(b => b.classList.remove('m-nav-btn--active'));
    document.getElementById('page-' + page).classList.remove('m-page--hidden');
    btn.classList.add('m-nav-btn--active');
    if (page === 'settings') loadApiKeyStatus();
  });
});

// ── API Key ───────────────────────────────────────────────────────
function loadApiKeyStatus() {
  const key = window.androidApi ? window.androidApi.getApiKey_js() : null;
  const status = document.getElementById('api-key-status');
  if (key && key.length > 0) {
    status.textContent = '✓ Set';
    status.style.color = '#34c759';
    document.getElementById('api-key-input').value = key;
  } else {
    status.textContent = 'Not set';
    status.style.color = 'var(--color-text-sub)';
  }
}

document.getElementById('btn-save-key').addEventListener('click', () => {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) return;
  window.androidApi.setApiKey(key);
  loadApiKeyStatus();
  showToast('API key saved!');
});

document.getElementById('btn-get-api-key').addEventListener('click', () => {
  window.androidApi.openUrl('https://www.steamgriddb.com/profile/preferences/api');
});

document.getElementById('btn-scrape-all').addEventListener('click', () => {
  const key = window.androidApi ? window.androidApi.getApiKey_js() : null;
  if (!key) { showToast('Add an API key first'); return; }
  window.androidApi.scrapeAllGames();
  showToast('Fetching box art for all games…');
});

// ── Meta update (box art arrived) ────────────────────────────────
window.__onMetaUpdated = function(update) {
  const tile = document.querySelector('.m-tile[data-id="' + update.id + '"]');
  if (!tile) return;
  const art = tile.querySelector('.m-tile__art');
  if (update.boxart && art) {
    art.innerHTML = '<img src="file://' + update.boxart + '" loading="lazy" style="width:100%;height:100%;object-fit:cover"/>';
  }
};

// ── Toast helper ─────────────────────────────────────────────────
function showToast(msg) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.style.cssText = 'background:#1c1c1e;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-family:sans-serif;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,0.3)';
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ── Search ───────────────────────────────────────────────────────
document.getElementById('lib-search-input').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  document.querySelectorAll('.m-tile').forEach(t => {
    t.style.display = t.querySelector('.m-tile__name').textContent.toLowerCase().includes(q) ? '' : 'none';
  });
});

// ── Scan ─────────────────────────────────────────────────────────
document.getElementById('btn-scan').addEventListener('click', runScan);
document.getElementById('btn-rescan').addEventListener('click', () => { document.getElementById('nav-games').click(); setTimeout(runScan, 150); });

async function runScan() {
  const progress = document.getElementById('scan-progress');
  const fill     = document.getElementById('progress-fill');
  const label    = document.getElementById('progress-label');
  progress.style.display = 'block';
  try {
    await window.api.openFolderPicker(p => {
      fill.style.width  = (p.total > 0 ? Math.round(p.current/p.total*100) : 0) + '%';
      label.textContent = p.current + '/' + p.total + ' — ' + p.lastFile;
    });
    progress.style.display = "none";
    loadGames();
    // Re-check after 3s for any art that arrived
    setTimeout(loadGames, 3000);
    setTimeout(loadGames, 6000);
  } catch(e) { progress.style.display = 'none'; }
}

// ── Select mode ──────────────────────────────────────────────────
var selectedIds = new Set();
var selectMode  = false;

function enterSelectMode() {
  selectMode = true;
  document.getElementById('select-bar').style.display = 'flex';
  document.getElementById('btn-scan').style.display   = 'none';
}

function exitSelectMode() {
  selectMode = false;
  selectedIds.clear();
  document.getElementById('select-bar').style.display = 'none';
  document.getElementById('btn-scan').style.display   = '';
  document.querySelectorAll('.m-tile--selected').forEach(t => t.classList.remove('m-tile--selected'));
  document.querySelectorAll('.m-tile__check').forEach(t => t.style.display = 'none');
  updateSelectCount();
}

function updateSelectCount() {
  const n = selectedIds.size;
  document.getElementById('select-count').textContent = n + ' selected';
  document.getElementById('btn-delete').disabled = n === 0;
}

document.getElementById('btn-cancel-select').addEventListener('click', exitSelectMode);
document.getElementById('btn-delete').addEventListener('click', () => {
  if (selectedIds.size === 0) return;
  window.androidApi.deleteGames(JSON.stringify(Array.from(selectedIds)));
  exitSelectMode();
  setTimeout(loadGames, 300);
});

// ── Render games ─────────────────────────────────────────────────
function systemLabel(s) {
  return {nes:'NES',snes:'SNES',gba:'GBA',gbc:'GBC',gb:'GB',genesis:'Genesis',atari2600:'Atari 2600',atari7800:'Atari 7800'}[s]||s.toUpperCase();
}

function loadGames() {
  if (!window.androidApi) return;
  const games = JSON.parse(window.androidApi.getAllGames());
  const grid  = document.getElementById('game-grid');
  const empty = document.getElementById('lib-empty');
  grid.innerHTML = '';
  if (games.length === 0) { empty.style.display = ''; return; }
  empty.style.display = 'none';

  const systems = [...new Set(games.map(g => g.system))];
  const pillsEl = document.getElementById('sys-nav-list');
  pillsEl.innerHTML = '';
  ['all', ...systems].forEach((sys, i) => {
    const p = document.createElement('button');
    p.className = 'm-pill' + (i === 0 ? ' m-pill--active' : '');
    p.textContent = i === 0 ? 'All' : systemLabel(sys);
    p.dataset.system = sys;
    p.addEventListener('click', () => {
      pillsEl.querySelectorAll('.m-pill').forEach(x => x.classList.remove('m-pill--active'));
      p.classList.add('m-pill--active');
      document.querySelectorAll('.m-tile').forEach(t => {
        t.style.display = (sys === 'all' || t.dataset.system === sys) ? '' : 'none';
      });
    });
    pillsEl.appendChild(p);
  });

  games.forEach(game => {
    const t = document.createElement('div');
    t.className = 'm-tile';
    t.dataset.id = game.id;
    t.dataset.system = game.system;
    const artSrc = game.boxart ? 'file://' + game.boxart : null;
    t.innerHTML = `
      <div class="m-tile__art">
        ${artSrc ? `<img src="${artSrc}" loading="lazy" style="width:100%;height:100%;object-fit:cover"/>` : `<svg class="m-tile__art-placeholder" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="48" height="48"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="16" cy="12" r="2"/><rect x="4" y="10" width="4" height="4" rx="1"/></svg>`}
        <div class="m-tile__check" id="check-${game.id}" style="display:none">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
      </div>
      <div class="m-tile__info">
        <div class="m-tile__name">${game.name}</div>
        <div class="m-tile__system">${systemLabel(game.system)}</div>
      </div>
      <div class="m-tile__badge">${systemLabel(game.system)}</div>`;

    t.addEventListener('click', () => {
      if (selectMode) toggleSelect(t, game.id);
      else window.androidApi.launchGame(game.id, game.name, game.rom_path || game.romPath || '', game.core || '');
    });

    let pressTimer;
    t.addEventListener('touchstart', () => { pressTimer = setTimeout(() => { if (!selectMode) enterSelectMode(); toggleSelect(t, game.id); }, 500); });
    t.addEventListener('touchend',  () => clearTimeout(pressTimer));
    t.addEventListener('touchmove', () => clearTimeout(pressTimer));
    grid.appendChild(t);
  });
}

function toggleSelect(tile, id) {
  if (selectedIds.has(id)) {
    selectedIds.delete(id);
    tile.classList.remove('m-tile--selected');
    document.getElementById('check-' + id).style.display = 'none';
  } else {
    selectedIds.add(id);
    tile.classList.add('m-tile--selected');
    document.getElementById('check-' + id).style.display = 'flex';
  }
  updateSelectCount();
}

window.addEventListener('DOMContentLoaded', loadGames);
window.addEventListener('rom:imported', loadGames);
</script>
</body>
</html>
